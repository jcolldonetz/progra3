<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <title>Items UI</title>
 <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; }
    button { margin-top: 20px; padding: 10px 20px; background: #87ADFD; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #AAE4FE; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    tr:nth-child(even) { background-color: #f9f9f9; }
    tr:hover { background-color: #f5f5f5; }
</style>
</head>
<body>
 <h1>Gestión de Items</h1>
 
 <div id="errors" style="display:none; color:red;"></div>
 
 <div id="items-list"></div>
 
 <form id="create-form">
 <label>Nombre del Item:
    <input type="text" name="name" required>
</label>

<label>Cantidad:
    <input type="number" name="qty" min="1" required>
</label>
 <label>Precio:
    <input type="number" name="price" min="0.01" max="99999999.99" step="0.01" required>
</label>
 <button type="submit">Crear Item</button>
 </form>

 <script>
    // Función para cargar la lista de items
    async function loadItems() {
        try {
            const response = await fetch('api/items');
            console.log('Respuesta del servidor:', response);
            const data = await response.json();
            console.log('Items cargados:', data);
            if(data.ok) {
                renderItems(data.items);
            } else {
                showErrors([data.error || 'Error al cargar los items']);
            }
        } catch (error) {
            console.error('Error al cargar los items:', error);
        }
    }

    function renderItems(items) {
        const container = document.getElementById('items-list');
    
        if (items.length === 0) {
            container.innerHTML = '<p>No hay items</p>';
            return;
        }
        
        let html = '<table>';
        html += '<thead>';
        html += '<tr>';
        html += '<th>ID</th>';
        html += '<th>Nombre</th>';
        html += '<th>Cantidad</th>';
        html += '<th>Precio</th>';
        //html += '<th>Creado</th>';
        //html += '<th>Actualizado</th>';
        html += '</tr>';
        html += '</thead>';
        html += '<tbody>';
        
        items.forEach(item => {
            html += '<tr>';
            html += `<td>${item.id}</td>`;
            html += `<td>${item.name}</td>`;
            html += `<td>${item.qty}</td>`;
            html += `<td>${item.price}</td>`;
            //html += `<td>${item.created_at}</td>`;
            //html += `<td>${item.updated_at}</td>`;
            html += '</tr>';
        });
        
        html += '</tbody>';
        html += '</table>';
        
        container.innerHTML = html;
    };

    // Manejar el envío del formulario de creación
    document.getElementById('create-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        // Ocultar errores anteriores
        document.getElementById('errors').style.display = 'none';

        const formData = new FormData(e.target);
        const data = {
            name: formData.get('name'),
            qty: parseInt(formData.get('qty'), 10),
            price: parseFloat(formData.get('price'))
        };

        try {
            const response = await fetch('api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const responseData = await response.json();
            
            if (response.ok && responseData.ok) {
                e.target.reset();
                loadItems();
                alert('Item creado exitosamente');
            } else {
                showErrors(responseData.errors || ['Error al crear el item']);
                return;
            }
        } catch (error) {
            showErrors([error.message]);
        }
    });

    // Función para mostrar errores
    function showErrors(errors) {
        // Asegurar que errors sea un array de strings
        if (!Array.isArray(errors)) {
            if (typeof errors === 'object' && errors !== null) {
                // Si es un objeto, extraer los valores (mensajes de error)
                errors = Object.values(errors);
            } else {
                errors = [String(errors)];
            }
        }
        
        const errorsDiv = document.getElementById('errors');
        console.error('Errores:', errors);
        errorsDiv.innerHTML = errors.map(err => `<p>${err}</p>`).join('');
        errorsDiv.style.display = 'block';
    }

    // Cargar la lista de items al cargar la página
    loadItems();
 </script>
</body>
</html>
